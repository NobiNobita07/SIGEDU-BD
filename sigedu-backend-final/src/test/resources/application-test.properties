# Base H2 solo para pruebas automatizadas
spring.datasource.url=jdbc:h2:mem:sigedu_test;MODE=MSSQLServer;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
